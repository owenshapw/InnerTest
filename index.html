<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inner Mountain · 内在状态测评</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #2D5A4A;
      --color-primary-light: #3d7a64;
      --color-secondary: #8B9A82;
      --color-accent: #D4A574;
      --color-accent-light: #e8c49a;
      --color-bg: #F5F2ED;
      --color-bg-card: #FDFBF8;
      --color-text: #333333;
      --color-text-light: #666666;
      --color-text-muted: #999999;
      --color-border: rgba(139,154,130,0.25);
      --radius: 14px;
      --shadow-card: 0 2px 20px rgba(45,90,74,0.08), 0 0 0 1px rgba(45,90,74,0.06);
      --shadow-hover: 0 6px 28px rgba(45,90,74,0.14), 0 0 0 1px rgba(45,90,74,0.08);
    }

    html, body {
      height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* ─── Layout ─── */
    .page {
      width: 100%;
      max-width: 680px;
      padding: 48px 24px 80px;
      flex: 1;
    }

    /* ─── Transitions ─── */
    .fade-in {
      animation: fadeIn 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .slide-up {
      animation: slideUp 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Logo / Brand ─── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
    }
    .brand-icon {
      width: 288px;
      height: 288px;
      position: relative;
    }
    .brand-icon-img {
      width: 288px;
      height: 288px;
      object-fit: contain;
      background: transparent;
    }
    .brand-name {
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--color-primary);
      text-transform: uppercase;
    }

    /* ─── Typography ─── */
    h1.serif {
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--color-secondary);
      letter-spacing: 0.18em;
    }
    h2.serif {
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--color-primary);
      letter-spacing: 0.04em;
    }
    .subtitle {
      font-size: 15px;
      color: var(--color-text-light);
      line-height: 1.8;
      letter-spacing: 0.02em;
    }

    /* ─── Button ─── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 12px 40px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
    }
    .btn-primary:hover {
      background: var(--color-primary-light);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(45,90,74,0.25);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--color-secondary);
      font-size: 14px;
      cursor: pointer;
      padding: 8px 4px;
      transition: color 0.2s;
      font-family: inherit;
    }
    .btn-ghost:hover { color: var(--color-primary); }

    /* ─── Divider ─── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--color-accent);
      margin: 20px auto;
      opacity: 0.6;
    }

    /* ─────────────────────────────
       INTRO VIEW
    ───────────────────────────── */
    .intro-hero {
      text-align: center;
      padding-top: 0;
      margin-bottom: 56px;
    }
    .intro-hero h1 { margin-bottom: 12px; }
    .intro-hero .subtitle { margin-bottom: 0; max-width: 400px; margin-left: auto; margin-right: auto; }

    .intro-footer {
      font-size: 12px;
      color: var(--color-text-muted);
      text-align: center;
      margin-top: 20px;
    }

    /* ─────────────────────────────
       QUESTION VIEW
    ───────────────────────────── */
    .q-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
    }
    .q-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .q-realm {
      font-size: 12px;
      color: var(--color-secondary);
      letter-spacing: 0.08em;
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
    }
    .q-count {
      font-size: 12px;
      color: var(--color-text-muted);
    }
    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(139,154,130,0.2);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-accent) 0%, var(--color-primary) 100%);
      border-radius: 100px;
      transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
    }

    .question-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 18px;
      padding: 40px 36px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-card);
    }
    .question-num {
      font-size: 12px;
      color: var(--color-accent);
      letter-spacing: 0.1em;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .question-text {
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
      font-size: 19px;
      font-weight: 400;
      line-height: 1.8;
      color: var(--color-text);
      letter-spacing: 0.04em;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--color-bg-card);
      border: 1.5px solid var(--color-border);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
      text-align: left;
      font-family: inherit;
      width: 100%;
    }
    .option-btn:hover {
      border-color: var(--color-secondary);
      background: rgba(139,154,130,0.06);
      transform: translateX(3px);
      box-shadow: var(--shadow-hover);
    }
    .option-btn.selected {
      border-color: var(--color-primary);
      background: rgba(45,90,74,0.05);
    }
    .option-btn.selected .option-letter {
      background: var(--color-primary);
      color: #fff;
    }
    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(139,154,130,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-secondary);
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .option-text {
      font-size: 14px;
      color: var(--color-text);
      line-height: 1.5;
    }
    .option-score {
      margin-left: auto;
      font-size: 11px;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }

    .q-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ─────────────────────────────
       RESULT VIEW
    ───────────────────────────── */
    .result-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(45,90,74,0.08);
      border: 1px solid rgba(45,90,74,0.15);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--color-primary);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
    }

    .avatar-ring {
      width: 120px;
      height: 120px;
      border-radius: 18px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-svg { display: flex; align-items: center; justify-content: center; width: 90px; height: 90px; }
    .avatar-svg svg { width: 100%; height: 100%; }

    .result-level-name {
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
      font-size: 26px;
      font-weight: 500;
      color: var(--color-primary);
      margin-bottom: 4px;
      letter-spacing: 0.06em;
    }
    .result-level-num {
      font-size: 13px;
      color: var(--color-secondary);
      letter-spacing: 0.1em;
    }

    .result-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 18px;
      padding: 32px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }
    .result-card-label {
      font-size: 11px;
      color: var(--color-accent);
      letter-spacing: 0.12em;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .result-desc {
      font-size: 14px;
      color: var(--color-text);
      line-height: 1.85;
      letter-spacing: 0.02em;
    }

    .result-status-card {
      background: linear-gradient(135deg, rgba(45,90,74,0.04) 0%, rgba(212,165,116,0.06) 100%);
      border: 1px solid rgba(212,165,116,0.25);
      border-radius: 18px;
      padding: 28px 32px;
      margin-bottom: 16px;
    }
    .status-type-tag {
      display: inline-block;
      background: var(--color-accent);
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 3px 12px;
      border-radius: 100px;
      margin-bottom: 14px;
      font-weight: 500;
    }
    .status-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-primary);
      line-height: 1.7;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(45,90,74,0.12);
    }
    .suggest-text {
      font-size: 14px;
      color: var(--color-text);
      line-height: 1.85;
    }

    /* Levels radar / summary */
    .levels-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .level-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .level-dot-bar {
      width: 100%;
      border-radius: 100px;
      transition: height 0.5s;
    }
    .level-dot-label {
      font-size: 9px;
      color: var(--color-text-muted);
      text-align: center;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .result-scores-section {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 18px;
      padding: 28px 32px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 0;
    }
    .score-row + .score-row {
      border-top: 1px solid rgba(139,154,130,0.12);
    }
    .score-realm-name {
      font-size: 12px;
      color: var(--color-text-light);
      width: 80px;
      flex-shrink: 0;
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
      letter-spacing: 0.02em;
    }
    .score-bar-wrap {
      flex: 1;
      height: 6px;
      background: rgba(139,154,130,0.15);
      border-radius: 100px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .score-val {
      font-size: 11px;
      color: var(--color-text-muted);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }
    .score-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 100px;
      flex-shrink: 0;
      letter-spacing: 0.06em;
      font-weight: 500;
    }
    .score-status.stabilized { background: rgba(45,90,74,0.12); color: var(--color-primary); }
    .score-status.awakened   { background: rgba(212,165,116,0.2); color: #a07030; }
    .score-status.inactive   { background: rgba(139,154,130,0.12); color: var(--color-text-muted); }

    .result-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 36px;
    }

    /* ─── Mountain SVG ─── */
    .mountain-svg { display: block; }

    /* ─── Decoration ─── */
    .dot-pattern {
      position: fixed;
      top: 0; right: 0;
      width: 300px; height: 300px;
      background-image: radial-gradient(circle, rgba(45,90,74,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }
    .dot-pattern-bl {
      position: fixed;
      bottom: 0; left: 0;
      width: 300px; height: 300px;
      background-image: radial-gradient(circle, rgba(212,165,116,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }
    #app > .page { position: relative; z-index: 1; }

    /* ─── Responsive ─── */
    @media (max-width: 520px) {
      .page { padding: 32px 18px 64px; }
      .brand-icon-img, .brand-icon { width: 180px; height: 180px; }
      .brand-name { font-size: 22px; }
      h1.serif { font-size: 14px; }
      .question-card { padding: 28px 22px; }
      .question-text { font-size: 17px; }
      .result-card, .result-scores-section, .result-status-card { padding: 22px 20px; }
      .levels-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
    }
  </style>
</head>
<body>
<div class="dot-pattern"></div>
<div class="dot-pattern-bl"></div>
<div id="app"></div>

<script>
// ══════════════════════════════════════
//  DATA (loaded from external JSON)
// ══════════════════════════════════════

let REALMS = [];
let QUESTIONS = [];
let OPTIONS = [];

    9: `<!-- 9: 引领共创 - Flag with connecting dots -->
      <line x1="28" y1="60" x2="28" y2="100" stroke="${gear}" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M28 60 L48 66 L28 72Z" fill="#E74C3C" opacity="0.7"/>
      <circle cx="16" cy="72" r="2" fill="${gearL}"/>
      <circle cx="38" cy="78" r="2" fill="${gearL}"/>
      <circle cx="16" cy="90" r="2" fill="${gearL}"/>
      <line x1="16" y1="72" x2="38" y2="78" stroke="${gearL}" stroke-width="1" opacity="0.5"/>
      <line x1="38" y1="78" x2="16" y2="90" stroke="${gearL}" stroke-width="1" opacity="0.5"/>`,

    10: `<!-- 10: 照亮生命 - Lantern spreading light -->
      <rect x="20" y="68" width="16" height="20" rx="4" fill="#FFF3E0" stroke="${prop}" stroke-width="1.5"/>
      <rect x="22" y="66" width="12" height="4" rx="2" fill="${prop}"/>
      <line x1="28" y1="66" x2="28" y2="60" stroke="${prop}" stroke-width="1.5"/>
      <circle cx="28" cy="78" r="5" fill="#FFD54F" opacity="0.6"/>
      <circle cx="28" cy="78" r="2.5" fill="#FF9800" opacity="0.8"/>
      <!-- Rays -->
      <line x1="28" y1="72" x2="28" y2="68" stroke="#FFD54F" stroke-width="1" opacity="0.4"/>
      <line x1="34" y1="78" x2="38" y2="78" stroke="#FFD54F" stroke-width="1" opacity="0.4"/>
      <line x1="22" y1="78" x2="18" y2="78" stroke="#FFD54F" stroke-width="1" opacity="0.4"/>
      <line x1="32" y1="74" x2="36" y2="72" stroke="#FFD54F" stroke-width="1" opacity="0.3"/>
      <line x1="24" y1="74" x2="20" y2="72" stroke="#FFD54F" stroke-width="1" opacity="0.3"/>`
  };

  return base + body + (props[id] || '') + end;
}

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    REALMS = data.realms;
    QUESTIONS = data.questions;
    OPTIONS = data.options;
    loadCache();
    render();
  })
  .catch(err => {
    document.getElementById('app').innerHTML = '<p style="text-align:center;color:#999;padding:40px">数据加载失败，请刷新重试</p>';
  });

const CACHE_KEY = "inner_mountain_v1";

// ══════════════════════════════════════
//  ALGORITHM
// ══════════════════════════════════════

function calcRealmScores(answers) {
  // answers: array of 30 scores (0,1,2) indexed 0-29
  const scores = [];
  for (let r = 0; r < 10; r++) {
    let s = 0;
    for (let q = 0; q < 3; q++) {
      s += (answers[r * 3 + q] || 0);
    }
    scores.push(s);
  }
  return scores;
}

function getStatus(score) {
  if (score >= 5) return "stabilized";
  if (score >= 3) return "awakened";
  return "inactive";
}

function evaluate(answers) {
  const scores = calcRealmScores(answers);
  const statuses = scores.map(getStatus);

  // currentLevel: 连续 stabilized 的最高索引（0-based），-1 表示没有
  let currentLevel = -1;
  for (let i = 0; i < 10; i++) {
    if (statuses[i] === "stabilized") currentLevel = i;
    else break;
  }

  // reachedLevel: 最高 awakened 或 stabilized 境界索引，-1 表示没有
  let reachedLevel = -1;
  for (let i = 0; i < 10; i++) {
    if (scores[i] >= 3) reachedLevel = i;
  }

  // faultLevel: 某层 inactive 但后续有 awakened/stabilized
  let faultLevel = null;
  for (let i = 0; i < 9; i++) {
    if (statuses[i] === "inactive") {
      for (let j = i + 1; j < 10; j++) {
        if (scores[j] >= 4) { faultLevel = i; break; }
      }
      if (faultLevel !== null) break;
    }
  }

  // blockLevel
  let blockLevel = null;
  if (currentLevel === 9 && reachedLevel === 9) {
    blockLevel = null; // 已达最高
  } else if (faultLevel !== null) {
    blockLevel = faultLevel;
  } else if (currentLevel < reachedLevel) {
    blockLevel = currentLevel; // 巩固当前层
  } else {
    blockLevel = (currentLevel + 1 < 10) ? currentLevel + 1 : null;
  }

  // userType
  let userType;
  if (reachedLevel === -1 || (currentLevel === -1 && reachedLevel === -1)) {
    userType = "迷雾探索";
  } else if (faultLevel !== null) {
    userType = "认知先行";
  } else if (currentLevel < reachedLevel) {
    userType = "觉醒未稳";
  } else {
    userType = "稳步前行";
  }

  return { scores, statuses, currentLevel, reachedLevel, faultLevel, blockLevel, userType };
}

// ══════════════════════════════════════
//  SVG MOUNTAIN
// ══════════════════════════════════════

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════

let state = {
  view: "intro",       // intro | question | result
  currentQ: 0,         // 0-29
  answers: new Array(30).fill(null),
  result: null
};

// Load from cache
function loadCache() {
  try {
    const c = localStorage.getItem(CACHE_KEY);
    if (c) {
      const d = JSON.parse(c);
      if (d.answers && d.answers.length === 30) {
        state.answers = d.answers;
        state.currentQ = d.currentQ || 0;
        if (d.view === "question") state.view = "question";
      }
    }
  } catch(e) {}
}

function saveCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      view: state.view,
      currentQ: state.currentQ,
      answers: state.answers
    }));
  } catch(e) {}
}

function clearCache() {
  try { localStorage.removeItem(CACHE_KEY); } catch(e) {}
}

// ══════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════

function render() {
  const app = document.getElementById("app");
  if (state.view === "intro")    app.innerHTML = renderIntro();
  if (state.view === "question") app.innerHTML = renderQuestion();
  if (state.view === "result")   app.innerHTML = renderResult();
  bindEvents();
}

// ── INTRO ──
function renderIntro() {
  const hasProgress = state.answers.some(a => a !== null);
  return `
  <div class="page fade-in">
    <div class="brand">
      <img src="inner-mountain_icon.png" alt="Inner Mountain" class="brand-icon-img" />
      <span class="brand-name">Inner Mountain</span>
    </div>

    <div class="intro-hero">
      <h1 class="serif">内在状态测评</h1>
      <div class="divider"></div>
      <p class="subtitle">30道题目，帮助了解你的内在状态<br/>已触达的境界与当下的卡点</p>
    </div>

    <div style="text-align:center">
      ${hasProgress ? `
        <button class="btn-primary" id="btn-continue">继续上次测评</button>
        <div style="margin-top:12px">
          <button class="btn-ghost" id="btn-restart">重新开始</button>
        </div>
      ` : `
        <button class="btn-primary" id="btn-start">开始测评</button>
      `}
    </div>
    <p class="intro-footer"></p>
  </div>`;
}

// ── QUESTION ──
function renderQuestion() {
  const q = QUESTIONS[state.currentQ];
  const realm = REALMS[q.realm - 1];
  const progress = ((state.currentQ + 1) / 30 * 100).toFixed(1);
  const selected = state.answers[state.currentQ];

  return `
  <div class="page">
    <div class="q-header">
      <div class="q-meta">
        <span class="q-count">${state.currentQ + 1} / 30</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="question-num">Q ${String(state.currentQ + 1).padStart(2, '0')}</div>
      <div class="question-text">${q.text}</div>
    </div>

    <div class="options">
      ${OPTIONS.map((opt, i) => `
        <button class="option-btn slide-up ${selected === opt.score ? 'selected' : ''}" data-score="${opt.score}" data-idx="${i}" style="animation-delay:${i * 0.04}s">
          <span class="option-letter">${opt.label}</span>
          <span class="option-text">${opt.text}</span>
        </button>
      `).join('')}
    </div>

    <div class="q-nav">
      ${state.currentQ > 0
        ? `<button class="btn-ghost" id="btn-prev">← 上一题</button>`
        : `<span></span>`}
      <span></span>
    </div>
  </div>`;
}

// ── RESULT ──
function renderResult() {
  const r = state.result;
  const { scores, statuses, currentLevel, reachedLevel, faultLevel, blockLevel, userType } = r;

  // display realm: for fault cases, show where user actually is; otherwise show reached/current
  let displayLevel;
  if (faultLevel !== null) {
    displayLevel = Math.max(faultLevel - 1, 0);
  } else if (reachedLevel >= 0) {
    displayLevel = reachedLevel;
  } else {
    displayLevel = Math.max(currentLevel, 0);
  }
  const realm = REALMS[displayLevel];

  // Status scene text
  let statusFirstPara = "";
  let suggestSrc = null;

  if (currentLevel === 9 && reachedLevel === 9 && blockLevel === null) {
    // 已达最高
    suggestSrc = REALMS[9];
    statusFirstPara = "";
  } else if (userType === "迷雾探索") {
    suggestSrc = REALMS[0];
    statusFirstPara = `你仍在迷雾中探索，尚未真正进入第1境界。`;
  } else if (faultLevel !== null) {
    // 有断层
    const fR = REALMS[faultLevel];
    const rR = REALMS[reachedLevel];
    suggestSrc = fR;
    statusFirstPara = `你已经看见第${reachedLevel + 1}境界的可能，但基础还未整合。你需要突破第${faultLevel + 1}境界「${fR.name}」这一层。`;
  } else if (currentLevel < reachedLevel) {
    // 巩固当前层
    const cR = REALMS[currentLevel < 0 ? 0 : currentLevel];
    suggestSrc = cR;
    statusFirstPara = `你仍需在第${currentLevel + 1}境界「${cR.name}」这一层继续精进。`;
  } else if (blockLevel !== null) {
    // 正常卡点
    const bR = REALMS[blockLevel];
    suggestSrc = bR;
    statusFirstPara = `你要抵达的下一个境界是第${blockLevel + 1}境界「${bR.name}」这一层。`;
  } else {
    suggestSrc = REALMS[Math.max(currentLevel, 0)];
    statusFirstPara = `你正在持续深化，继续前行。`;
  }

  const suggestion = suggestSrc ? suggestSrc.suggestion : REALMS[9].suggestion;

  // Score bars
  const scoreBarsHTML = scores.map((s, i) => {
    const st = statuses[i];
    const pct = (s / 6 * 100).toFixed(0);
    let barColor;
    if (st === "stabilized") barColor = "var(--color-primary)";
    else if (st === "awakened") barColor = "var(--color-accent)";
    else barColor = "rgba(139,154,130,0.3)";

    const statusLabel = st === "stabilized" ? "已稳定" : st === "awakened" ? "已觉醒" : "未激活";
    return `
    <div class="score-row">
      <span class="score-realm-name">${REALMS[i].name}</span>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
      <span class="score-val">${s}/6</span>
      <span class="score-status ${st}">${statusLabel}</span>
    </div>`;
  }).join('');

  const maxLabel = displayLevel === 9 && faultLevel === null ? "已达最高境界 · 持续精进" : faultLevel !== null ? `当前位置 · 第${displayLevel + 1}层` : `当前境界 · 第${displayLevel + 1}层`;

  return `
  <div class="page fade-in">
    <div class="result-header">
      <div class="avatar-ring">
        <img src="avatars/${realm.id}.webp" alt="${realm.name}" class="avatar-img" />
      </div>
      <div class="result-level-name">${realm.name}</div>
      <div class="result-level-num">${maxLabel}</div>
    </div>

    <!-- 境界描述 -->
    <div class="result-card slide-up" style="animation-delay:0.05s">
      <p class="result-desc">${realm.desc}</p>
    </div>

    <!-- 状态解读 -->
    <div class="result-status-card slide-up" style="animation-delay:0.1s">
      <p class="status-text">${statusFirstPara}</p>
      <p class="suggest-text">${suggestion}</p>
    </div>

    <div class="result-actions">
      <button class="btn-primary" id="btn-retake">重新测评</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════
//  EVENT BINDING
// ══════════════════════════════════════

function bindEvents() {
  // Intro
  const btnStart = document.getElementById("btn-start");
  if (btnStart) btnStart.addEventListener("click", () => {
    state.view = "question";
    state.currentQ = 0;
    state.answers = new Array(30).fill(null);
    saveCache();
    render();
  });

  const btnContinue = document.getElementById("btn-continue");
  if (btnContinue) btnContinue.addEventListener("click", () => {
    state.view = "question";
    render();
  });

  const btnRestart = document.getElementById("btn-restart");
  if (btnRestart) btnRestart.addEventListener("click", () => {
    state.currentQ = 0;
    state.answers = new Array(30).fill(null);
    clearCache();
    state.view = "question";
    render();
  });

  // Question options
  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const score = parseInt(btn.dataset.score);
      state.answers[state.currentQ] = score;
      saveCache();

      // Animate selection then advance
      document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");

      setTimeout(() => {
        if (state.currentQ < 29) {
          state.currentQ++;
          saveCache();
          render();
        } else {
          // Calc result
          state.result = evaluate(state.answers);
          state.view = "result";
          clearCache();
          render();
        }
      }, 320);
    });
  });

  const btnPrev = document.getElementById("btn-prev");
  if (btnPrev) btnPrev.addEventListener("click", () => {
    if (state.currentQ > 0) {
      state.currentQ--;
      saveCache();
      render();
    }
  });

  // Result retake
  const btnRetake = document.getElementById("btn-retake");
  if (btnRetake) btnRetake.addEventListener("click", () => {
    state.view = "intro";
    state.currentQ = 0;
    state.answers = new Array(30).fill(null);
    state.result = null;
    clearCache();
    render();
  });
}
