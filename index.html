<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inner Mountain · 内在状态测评</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #2D5A4A;
      --color-primary-light: #3d7a64;
      --color-secondary: #8B9A82;
      --color-accent: #D4A574;
      --color-accent-light: #e8c49a;
      --color-bg: #F5F2ED;
      --color-bg-card: #FDFBF8;
      --color-text: #333333;
      --color-text-light: #666666;
      --color-text-muted: #999999;
      --color-border: rgba(139,154,130,0.25);
      --radius: 14px;
      --shadow-card: 0 2px 20px rgba(45,90,74,0.08), 0 0 0 1px rgba(45,90,74,0.06);
      --shadow-hover: 0 6px 28px rgba(45,90,74,0.14), 0 0 0 1px rgba(45,90,74,0.08);
    }

    html, body {
      height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Inter', 'PingFang SC', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* ─── Layout ─── */
    .page {
      width: 100%;
      max-width: 680px;
      padding: 48px 24px 80px;
      flex: 1;
    }

    /* ─── Transitions ─── */
    .fade-in {
      animation: fadeIn 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .slide-up {
      animation: slideUp 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Logo / Brand ─── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 52px;
    }
    .brand-icon {
      width: 64px;
      height: 64px;
      position: relative;
    }
    .brand-icon-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      background: transparent;
    }
    .brand-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--color-secondary);
      text-transform: uppercase;
    }

    /* ─── Typography ─── */
    h1.serif {
      font-family: 'Noto Serif SC', serif;
      font-size: 30px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--color-primary);
      letter-spacing: 0.04em;
    }
    h2.serif {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--color-primary);
      letter-spacing: 0.04em;
    }
    .subtitle {
      font-size: 15px;
      color: var(--color-text-light);
      line-height: 1.8;
      letter-spacing: 0.02em;
    }

    /* ─── Button ─── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      font-family: 'Noto Serif SC', serif;
    }
    .btn-primary:hover {
      background: var(--color-primary-light);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(45,90,74,0.25);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--color-secondary);
      font-size: 14px;
      cursor: pointer;
      padding: 8px 4px;
      transition: color 0.2s;
      font-family: inherit;
    }
    .btn-ghost:hover { color: var(--color-primary); }

    /* ─── Divider ─── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--color-accent);
      margin: 20px auto;
      opacity: 0.6;
    }

    /* ─────────────────────────────
       INTRO VIEW
    ───────────────────────────── */
    .intro-hero {
      text-align: center;
      padding-top: 16px;
    }
    .intro-hero h1 { margin-bottom: 8px; }
    .intro-hero .subtitle { margin-bottom: 48px; max-width: 440px; margin-left: auto; margin-right: auto; }

    .intro-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 48px;
    }
    .intro-feature {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .intro-feature-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(45,90,74,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }
    .intro-feature-text h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-primary);
      margin-bottom: 3px;
      letter-spacing: 0.04em;
    }
    .intro-feature-text p {
      font-size: 13px;
      color: var(--color-text-light);
      line-height: 1.65;
    }

    .intro-footer {
      font-size: 12px;
      color: var(--color-text-muted);
      text-align: center;
      margin-top: 20px;
    }

    /* ─────────────────────────────
       QUESTION VIEW
    ───────────────────────────── */
    .q-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
    }
    .q-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .q-realm {
      font-size: 12px;
      color: var(--color-secondary);
      letter-spacing: 0.08em;
      font-family: 'Noto Serif SC', serif;
    }
    .q-count {
      font-size: 12px;
      color: var(--color-text-muted);
    }
    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(139,154,130,0.2);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-accent) 0%, var(--color-primary) 100%);
      border-radius: 100px;
      transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
    }

    .question-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 18px;
      padding: 40px 36px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-card);
    }
    .question-num {
      font-size: 12px;
      color: var(--color-accent);
      letter-spacing: 0.1em;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .question-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 19px;
      font-weight: 400;
      line-height: 1.8;
      color: var(--color-text);
      letter-spacing: 0.04em;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--color-bg-card);
      border: 1.5px solid var(--color-border);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
      text-align: left;
      font-family: inherit;
      width: 100%;
    }
    .option-btn:hover {
      border-color: var(--color-secondary);
      background: rgba(139,154,130,0.06);
      transform: translateX(3px);
      box-shadow: var(--shadow-hover);
    }
    .option-btn.selected {
      border-color: var(--color-primary);
      background: rgba(45,90,74,0.05);
    }
    .option-btn.selected .option-letter {
      background: var(--color-primary);
      color: #fff;
    }
    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(139,154,130,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-secondary);
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .option-text {
      font-size: 14px;
      color: var(--color-text);
      line-height: 1.5;
    }
    .option-score {
      margin-left: auto;
      font-size: 11px;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }

    .q-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ─────────────────────────────
       RESULT VIEW
    ───────────────────────────── */
    .result-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(45,90,74,0.08);
      border: 1px solid rgba(45,90,74,0.15);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--color-primary);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      font-family: 'Noto Serif SC', serif;
    }

    .avatar-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(45,90,74,0.1) 0%, rgba(212,165,116,0.15) 100%);
      border: 2px solid rgba(45,90,74,0.12);
      position: relative;
    }
    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px dashed rgba(212,165,116,0.4);
    }
    .avatar-emoji { font-size: 52px; line-height: 1; }

    .result-level-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 500;
      color: var(--color-primary);
      margin-bottom: 4px;
      letter-spacing: 0.06em;
    }
    .result-level-num {
      font-size: 13px;
      color: var(--color-secondary);
      letter-spacing: 0.1em;
    }

    .result-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 18px;
      padding: 32px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }
    .result-card-label {
      font-size: 11px;
      color: var(--color-accent);
      letter-spacing: 0.12em;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .result-desc {
      font-size: 15px;
      color: var(--color-text);
      line-height: 1.9;
      letter-spacing: 0.02em;
    }

    .result-status-card {
      background: linear-gradient(135deg, rgba(45,90,74,0.04) 0%, rgba(212,165,116,0.06) 100%);
      border: 1px solid rgba(212,165,116,0.25);
      border-radius: 18px;
      padding: 28px 32px;
      margin-bottom: 16px;
    }
    .status-type-tag {
      display: inline-block;
      background: var(--color-accent);
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 3px 12px;
      border-radius: 100px;
      margin-bottom: 14px;
      font-weight: 500;
    }
    .status-text {
      font-size: 14px;
      color: var(--color-text);
      line-height: 1.85;
      margin-bottom: 16px;
    }
    .suggest-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-primary);
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .suggest-text {
      font-size: 14px;
      color: var(--color-text);
      line-height: 1.85;
    }

    /* Levels radar / summary */
    .levels-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .level-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .level-dot-bar {
      width: 100%;
      border-radius: 100px;
      transition: height 0.5s;
    }
    .level-dot-label {
      font-size: 9px;
      color: var(--color-text-muted);
      text-align: center;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .result-scores-section {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 18px;
      padding: 28px 32px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 0;
    }
    .score-row + .score-row {
      border-top: 1px solid rgba(139,154,130,0.12);
    }
    .score-realm-name {
      font-size: 12px;
      color: var(--color-text-light);
      width: 80px;
      flex-shrink: 0;
      font-family: 'Noto Serif SC', serif;
      letter-spacing: 0.02em;
    }
    .score-bar-wrap {
      flex: 1;
      height: 6px;
      background: rgba(139,154,130,0.15);
      border-radius: 100px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .score-val {
      font-size: 11px;
      color: var(--color-text-muted);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }
    .score-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 100px;
      flex-shrink: 0;
      letter-spacing: 0.06em;
      font-weight: 500;
    }
    .score-status.stabilized { background: rgba(45,90,74,0.12); color: var(--color-primary); }
    .score-status.awakened   { background: rgba(212,165,116,0.2); color: #a07030; }
    .score-status.inactive   { background: rgba(139,154,130,0.12); color: var(--color-text-muted); }

    .result-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 36px;
    }

    /* ─── Mountain SVG ─── */
    .mountain-svg { display: block; }

    /* ─── Decoration ─── */
    .dot-pattern {
      position: fixed;
      top: 0; right: 0;
      width: 300px; height: 300px;
      background-image: radial-gradient(circle, rgba(45,90,74,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }
    .dot-pattern-bl {
      position: fixed;
      bottom: 0; left: 0;
      width: 300px; height: 300px;
      background-image: radial-gradient(circle, rgba(212,165,116,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }
    #app > .page { position: relative; z-index: 1; }

    /* ─── Responsive ─── */
    @media (max-width: 520px) {
      .page { padding: 32px 18px 64px; }
      .question-card { padding: 28px 22px; }
      .question-text { font-size: 17px; }
      h1.serif { font-size: 24px; }
      .result-card, .result-scores-section, .result-status-card { padding: 22px 20px; }
      .levels-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
    }
  </style>
</head>
<body>
<div class="dot-pattern"></div>
<div class="dot-pattern-bl"></div>
<div id="app"></div>

const OPTIONS = [
  { label: "A", text: "高度符合", score: 2 },
  { label: "B", text: "部分符合", score: 1 },

];

const CACHE_KEY = "inner_mountain_v1";

// ══════════════════════════════════════
//  ALGORITHM
// ══════════════════════════════════════

function calcRealmScores(answers) {
  // answers: array of 30 scores (0,1,2) indexed 0-29
  const scores = [];
  for (let r = 0; r < 10; r++) {
    let s = 0;
    for (let q = 0; q < 3; q++) {
      s += (answers[r * 3 + q] || 0);
    }
    scores.push(s);
  }
  return scores;
}

function getStatus(score) {
  if (score >= 5) return "stabilized";
  if (score >= 3) return "awakened";
  return "inactive";
}

function evaluate(answers) {
  const scores = calcRealmScores(answers);
  const statuses = scores.map(getStatus);

  // currentLevel: 连续 stabilized 的最高索引（0-based），-1 表示没有
  let currentLevel = -1;
  for (let i = 0; i < 10; i++) {
    if (statuses[i] === "stabilized") currentLevel = i;
    else break;
  }

  // reachedLevel: 最高 awakened 或 stabilized 境界索引，-1 表示没有
  let reachedLevel = -1;
  for (let i = 0; i < 10; i++) {
    if (scores[i] >= 3) reachedLevel = i;
  }

  // faultLevel: 某层 inactive 但后续有 awakened/stabilized
  let faultLevel = null;
  for (let i = 0; i < 9; i++) {
    if (statuses[i] === "inactive") {
      for (let j = i + 1; j < 10; j++) {
        if (scores[j] >= 4) { faultLevel = i; break; }
      }
      if (faultLevel !== null) break;
    }
  }

  // blockLevel
  let blockLevel = null;
  if (currentLevel === 9 && reachedLevel === 9) {
    blockLevel = null; // 已达最高
  } else if (faultLevel !== null) {
    blockLevel = faultLevel;
  } else if (currentLevel < reachedLevel) {
    blockLevel = currentLevel; // 巩固当前层
  } else {
    blockLevel = (currentLevel + 1 < 10) ? currentLevel + 1 : null;
  }

  // userType
  let userType;
  if (reachedLevel === -1 || (currentLevel === -1 && reachedLevel === -1)) {
    userType = "迷雾探索";
  } else if (faultLevel !== null) {
    userType = "认知先行";
  } else if (currentLevel < reachedLevel) {
    userType = "觉醒未稳";
  } else {
    userType = "稳步前行";
  }

  return { scores, statuses, currentLevel, reachedLevel, faultLevel, blockLevel, userType };
}

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════

let state = {
  view: "intro",       // intro | question | result
  currentQ: 0,         // 0-29
  answers: new Array(30).fill(null),
  result: null
};

// Load from cache
function loadCache() {
  try {
    const c = localStorage.getItem(CACHE_KEY);
    if (c) {
      const d = JSON.parse(c);
      if (d.answers && d.answers.length === 30) {
        state.answers = d.answers;
        state.currentQ = d.currentQ || 0;
        if (d.view === "question") state.view = "question";
      }
    }
  } catch(e) {}
}

function saveCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      view: state.view,
      currentQ: state.currentQ,
      answers: state.answers
    }));
  } catch(e) {}
}

function clearCache() {
  try { localStorage.removeItem(CACHE_KEY); } catch(e) {}
}

// ══════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════

function render() {
  const app = document.getElementById("app");
  if (state.view === "intro")    app.innerHTML = renderIntro();
  if (state.view === "question") app.innerHTML = renderQuestion();
  if (state.view === "result")   app.innerHTML = renderResult();
  bindEvents();
}

// ── QUESTION ──
function renderQuestion() {
  const q = QUESTIONS[state.currentQ];
  const realm = REALMS[q.realm - 1];
  const progress = ((state.currentQ + 1) / 30 * 100).toFixed(1);
  const selected = state.answers[state.currentQ];

  return `
  <div class="page fade-in">
    <div class="q-header">
      <div class="q-meta">
        <span class="q-realm">第 ${q.realm} 境界 · ${realm.name}</span>
        <span class="q-count">${state.currentQ + 1} / 30</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="question-card slide-up">
      <div class="question-num">Q ${String(state.currentQ + 1).padStart(2, '0')}</div>
      <div class="question-text">${q.text}</div>
    </div>

    <div class="options">
      ${OPTIONS.map((opt, i) => `
        <button class="option-btn ${selected === opt.score ? 'selected' : ''}" data-score="${opt.score}" data-idx="${i}">
          <span class="option-letter">${opt.label}</span>
          <span class="option-text">${opt.text}</span>
          <span class="option-score">${opt.score > 0 ? '+' + opt.score : '—'}</span>
        </button>
      `).join('')}
    </div>

    <div class="q-nav">
      ${state.currentQ > 0
        ? `<button class="btn-ghost" id="btn-prev">← 上一题</button>`
        : `<span></span>`}
      <span></span>
    </div>
  </div>`;
}

// ── RESULT ──
function renderResult() {
  const r = state.result;
  const { scores, statuses, currentLevel, reachedLevel, faultLevel, blockLevel, userType } = r;

  // display realm (show at least realm 1 even if not activated)
  const displayLevel = Math.max(currentLevel, 0);
  const realm = REALMS[displayLevel];

  // Status scene text
  let statusFirstPara = "";
  let suggestSrc = null;

  if (currentLevel === 9 && reachedLevel === 9 && blockLevel === null) {
    // 已达最高
    suggestSrc = REALMS[9];
    statusFirstPara = "";
  } else if (userType === "迷雾探索") {
    suggestSrc = REALMS[0];
    statusFirstPara = `你仍在迷雾中探索，尚未真正进入第1境界。`;
  } else if (faultLevel !== null) {
    // 有断层
    const fR = REALMS[faultLevel];
    const rR = REALMS[reachedLevel];
    suggestSrc = fR;
    statusFirstPara = `你已经看见第${reachedLevel + 1}境界的可能，但基础还未整合。你需要突破第${faultLevel + 1}境界「${fR.name}」这一层。`;
  } else if (currentLevel < reachedLevel) {
    // 巩固当前层
    const cR = REALMS[currentLevel < 0 ? 0 : currentLevel];
    suggestSrc = cR;
    statusFirstPara = `你仍需在第${currentLevel + 1}境界「${cR.name}」这一层继续精进。`;
  } else if (blockLevel !== null) {
    // 正常卡点
    const bR = REALMS[blockLevel];
    suggestSrc = bR;
    statusFirstPara = `你要抵达的下一个境界是第${blockLevel + 1}境界「${bR.name}」这一层。`;
  } else {
    suggestSrc = REALMS[Math.max(currentLevel, 0)];
    statusFirstPara = `你正在持续深化，继续前行。`;
  }

  const suggestion = suggestSrc ? suggestSrc.suggestion : REALMS[9].suggestion;

  // Score bars
  const scoreBarsHTML = scores.map((s, i) => {
    const st = statuses[i];
    const pct = (s / 6 * 100).toFixed(0);
    let barColor;
    if (st === "stabilized") barColor = "var(--color-primary)";
    else if (st === "awakened") barColor = "var(--color-accent)";
    else barColor = "rgba(139,154,130,0.3)";

    const statusLabel = st === "stabilized" ? "已稳定" : st === "awakened" ? "已觉醒" : "未激活";
    return `
    <div class="score-row">
      <span class="score-realm-name">${REALMS[i].name}</span>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
      <span class="score-val">${s}/6</span>
      <span class="score-status ${st}">${statusLabel}</span>
    </div>`;
  }).join('');

  const maxLabel = blockLevel === null && currentLevel === 9 ? "已达最高境界 · 持续精进" : `当前境界 · 第${displayLevel + 1}层`;

  return `
  <div class="page fade-in">
    <div class="result-header">
      <div class="result-badge">
        ${mountainSVG(14)}
        &nbsp;Inner Mountain · 测评结果
      </div>
      <div class="avatar-ring">
        <span class="avatar-emoji">${realm.emoji}</span>
      </div>
      <div class="result-level-name">${realm.name}</div>
      <div class="result-level-num">${maxLabel}</div>
    </div>

    <!-- 境界描述 -->
    <div class="result-card slide-up" style="animation-delay:0.05s">
      <div class="result-card-label">✦ 你的内在状态</div>
      <p class="result-desc">${realm.desc}</p>
    </div>

    <!-- 状态解读 -->
    <div class="result-status-card slide-up" style="animation-delay:0.1s">
      <div class="status-type-tag">${userType}</div>
      ${statusFirstPara ? `<p class="status-text">${statusFirstPara}</p>` : ''}
      <div class="suggest-label">建议</div>
      <p class="suggest-text">${suggestion}</p>
    </div>

    <!-- 各境界得分 -->
    <div class="result-scores-section slide-up" style="animation-delay:0.15s">
      <div class="result-card-label" style="margin-bottom:16px">✦ 十层境界全貌</div>
      ${scoreBarsHTML}
    </div>

    <div class="result-actions">
      <button class="btn-primary" id="btn-retake">重新测评</button>
      <button class="btn-ghost" id="btn-share-hint">∞ 保存或分享结果</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════
//  EVENT BINDING
// ══════════════════════════════════════

function bindEvents() {
  // Intro
  const btnStart = document.getElementById("btn-start");
  if (btnStart) btnStart.addEventListener("click", () => {
    state.view = "question";
    state.currentQ = 0;
    state.answers = new Array(30).fill(null);
    saveCache();
    render();
  });

  const btnContinue = document.getElementById("btn-continue");
  if (btnContinue) btnContinue.addEventListener("click", () => {
    state.view = "question";
    render();
  });

  const btnRestart = document.getElementById("btn-restart");
  if (btnRestart) btnRestart.addEventListener("click", () => {
    state.currentQ = 0;
    state.answers = new Array(30).fill(null);
    clearCache();
    state.view = "question";
    render();
  });

  // Question options
  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const score = parseInt(btn.dataset.score);
      state.answers[state.currentQ] = score;
      saveCache();

      // Animate selection then advance
      document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");

      setTimeout(() => {
        if (state.currentQ < 29) {
          state.currentQ++;
          saveCache();
          render();
        } else {
          // Calc result
          state.result = evaluate(state.answers);
          state.view = "result";
          clearCache();
          render();
        }
      }, 320);
    });
  });

  const btnPrev = document.getElementById("btn-prev");
  if (btnPrev) btnPrev.addEventListener("click", () => {
    if (state.currentQ > 0) {
      state.currentQ--;
      saveCache();
      render();
    }
  });

  // Result retake
  const btnRetake = document.getElementById("btn-retake");
  if (btnRetake) btnRetake.addEventListener("click", () => {
    state.view = "intro";
    state.currentQ = 0;
    state.answers = new Array(30).fill(null);
    state.result = null;
    clearCache();
    render();
  });

  // Share hint
  const btnShareHint = document.getElementById("btn-share-hint");
  if (btnShareHint) btnShareHint.addEventListener("click", () => {
    const r = state.result;
    const realm = REALMS[Math.max(r.currentLevel, 0)];
    const text = `Inner Mountain 内在状态测评 ✦\n我的境界：${realm.name}（第${Math.max(r.currentLevel, 0) + 1}层）\n用户类型：${r.userType}\n\n来测测你的内在状态 →`;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        btnShareHint.textContent = "✓ 已复制到剪贴板";
        setTimeout(() => { btnShareHint.textContent = "∞ 保存或分享结果"; }, 2000);
      });
    } else {
      alert(text);
    }
  });
}

loadCache();
