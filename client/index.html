<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg">
  <title>Inner Mountain 内在状态测评</title>
  <style>
    /* 隐藏首次加载的妙搭 Logo */
    .app-loading-logo,
    .miaoda-loading,
    .miaoda-logo,
    [class*="loading-logo"],
    [class*="LoadingLogo"],
    [class*="loading"],
    [class*="Loading"],
    [class*="splash"],
    [class*="Splash"] {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      width: 0 !important;
      height: 0 !important;
      position: absolute !important;
      z-index: -9999 !important;
    }
    /* 隐藏可能包含 Logo 的固定定位容器 */
    div[style*="position: fixed"][style*="z-index: 999"],
    div[style*="position:fixed"][style*="z-index:999"] {
      display: none !important;
    }
  </style>
  <script>
    try {
      window.__platform__ = JSON.parse('{{{__platform__}}}');
    } catch (e) {
      console.error('Failed to parse __platform__', e);
    }
    // 移除首次加载的 Logo - 使用 MutationObserver 持续监控
    (function() {
      function hideLoadingLogos() {
        var selectors = [
          '[class*="loading"]',
          '[class*="Loading"]',
          '[class*="splash"]',
          '[class*="Splash"]',
          '.app-loading-logo',
          '.miaoda-loading',
          '.miaoda-logo'
        ];
        selectors.forEach(function(sel) {
          var els = document.querySelectorAll(sel);
          els.forEach(function(el) {
            el.style.display = 'none';
            el.style.opacity = '0';
            el.style.visibility = 'hidden';
          });
        });
      }
      // 立即执行
      hideLoadingLogos();
      // DOM 加载完成后执行
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', hideLoadingLogos);
      }
      // 使用 MutationObserver 持续监控新添加的元素
      if (typeof MutationObserver !== 'undefined') {
        var observer = new MutationObserver(function(mutations) {
          hideLoadingLogos();
        });
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true
        });
        // 5秒后停止观察
        setTimeout(function() {
          observer.disconnect();
        }, 5000);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/client/src/index.tsx"></script>
</body>

</html>
